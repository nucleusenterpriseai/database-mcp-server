version: "3.8"

services:
  mcp-database-server:
    build: ..
    ports:
      - "8443:8443"
    volumes:
      - ./config.yaml:/app/config/db-mcp-server.yaml:ro
    environment:
      - MCP_API_KEY=your-api-key-here
      - DB_HOST=db.example.com
      - DB_USERNAME=readonly_user
      - DB_PASSWORD=your-password-here
      - DB_NAME=myapp
    restart: unless-stopped

    # Optional: health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
